<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" font-family="Arial, sans-serif">
  <!-- Title -->
  <text x="550" y="30" font-size="22" font-weight="bold" text-anchor="middle">Design 1: F1TENTH Vehicle — Power Block Diagram</text>
  <text x="550" y="55" font-size="13" text-anchor="middle" fill="#555">Only power routing is shown. Data lines omitted.</text>

  <!-- 3S LiPo Battery (source) -->
  <g>
    <rect x="40" y="240" width="170" height="120" rx="10" fill="#ffe9b3" stroke="#a67c00" stroke-width="2"/>
    <text x="125" y="270" font-size="16" font-weight="bold" text-anchor="middle">3S LiPo Battery</text>
    <text x="125" y="295" font-size="13" text-anchor="middle">9.0 V – 12.6 V</text>
    <text x="125" y="315" font-size="12" text-anchor="middle">(depleted → full)</text>
    <text x="125" y="340" font-size="11" text-anchor="middle" fill="#7a5b00">f1tenth.org</text>
  </g>

  <!-- Boost Converter (12V/1A) -->
  <g>
    <rect x="290" y="100" width="220" height="100" rx="8" fill="#d6e9ff" stroke="#1e4f8a" stroke-width="2"/>
    <text x="400" y="130" font-size="15" font-weight="bold" text-anchor="middle">Boost Converter</text>
    <text x="400" y="152" font-size="13" text-anchor="middle">TPS61236</text>
    <text x="400" y="172" font-size="12" text-anchor="middle">Vin 9–12.6 V → 12 V / 1 A</text>
  </g>

  <!-- Buck Converter (5V/4.5A) -->
  <g>
    <rect x="290" y="380" width="220" height="100" rx="8" fill="#d6e9ff" stroke="#1e4f8a" stroke-width="2"/>
    <text x="400" y="410" font-size="15" font-weight="bold" text-anchor="middle">Buck Converter</text>
    <text x="400" y="432" font-size="13" text-anchor="middle">TPS54360</text>
    <text x="400" y="452" font-size="12" text-anchor="middle">Vin 12 V → 5 V / 4.5 A</text>
  </g>

  <!-- LiDAR -->
  <g>
    <rect x="700" y="100" width="200" height="100" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
    <text x="800" y="130" font-size="15" font-weight="bold" text-anchor="middle">LiDAR</text>
    <text x="800" y="152" font-size="13" text-anchor="middle">12 V @ up to 1 A</text>
    <text x="800" y="175" font-size="11" text-anchor="middle" fill="#444">12 V rail</text>
  </g>

  <!-- Jetson -->
  <g>
    <rect x="700" y="280" width="200" height="100" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
    <text x="800" y="310" font-size="15" font-weight="bold" text-anchor="middle">Jetson Xavier NX</text>
    <text x="800" y="332" font-size="13" text-anchor="middle">5 V @ up to 3 A</text>
    <text x="800" y="355" font-size="11" text-anchor="middle" fill="#444">Main microprocessor</text>
  </g>

  <!-- Camera -->
  <g>
    <rect x="700" y="460" width="200" height="100" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
    <text x="800" y="490" font-size="15" font-weight="bold" text-anchor="middle">Camera</text>
    <text x="800" y="512" font-size="13" text-anchor="middle">5 V @ up to 1.5 A</text>
    <text x="800" y="535" font-size="11" text-anchor="middle" fill="#444">5 V rail</text>
  </g>

  <!-- Wires -->
  <!-- Battery to Boost -->
  <line x1="210" y1="280" x2="290" y2="150" stroke="#b35900" stroke-width="3"/>
  <text x="250" y="200" font-size="11" fill="#b35900">9-12.6 V</text>
  <!-- Battery to Buck (after 12V bus taps off) -->
  <line x1="210" y1="320" x2="290" y2="430" stroke="#b35900" stroke-width="3"/>
  <text x="250" y="420" font-size="11" fill="#b35900">9-12.6 V</text>
  <!-- Boost to LiDAR -->
  <line x1="510" y1="150" x2="700" y2="150" stroke="#9c27b0" stroke-width="3"/>
  <text x="600" y="142" font-size="11" fill="#9c27b0">12 V @ 1 A</text>
  <!-- Buck to Jetson -->
  <line x1="510" y1="430" x2="700" y2="330" stroke="#9c27b0" stroke-width="3"/>
  <text x="600" y="375" font-size="11" fill="#9c27b0">5 V @ 3 A</text>
  <!-- Buck to Camera -->
  <line x1="510" y1="450" x2="700" y2="510" stroke="#9c27b0" stroke-width="3"/>
  <text x="600" y="500" font-size="11" fill="#9c27b0">5 V @ 1.5 A</text>

  <!-- Legend -->
  <g>
    <rect x="40" y="500" width="500" height="80" rx="8" fill="#fafafa" stroke="#aaa"/>
    <text x="55" y="525" font-size="13" font-weight="bold">Legend</text>
    <line x1="55" y1="545" x2="105" y2="545" stroke="#b35900" stroke-width="3"/>
    <text x="115" y="550" font-size="12">Battery-side rail (unregulated)</text>
    <line x1="290" y1="545" x2="340" y2="545" stroke="#9c27b0" stroke-width="3"/>
    <text x="350" y="550" font-size="12">Regulated rail (load-side)</text>
  </g>
</svg>