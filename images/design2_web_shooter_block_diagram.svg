<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 720" font-family="Arial, sans-serif">
  <!-- Title -->
  <text x="650" y="30" font-size="22" font-weight="bold" text-anchor="middle">Design 2: Spider-Man Web Shooter — Block Diagram</text>
  <text x="650" y="55" font-size="13" text-anchor="middle" fill="#555">Power (solid, red) and Data (dashed, blue) routing shown.</text>

  <!-- Power Supply -->
  <g>
    <rect x="40" y="320" width="180" height="110" rx="10" fill="#ffe9b3" stroke="#a67c00" stroke-width="2"/>
    <text x="130" y="350" font-size="15" font-weight="bold" text-anchor="middle">DC Power Supply</text>
    <text x="130" y="372" font-size="13" text-anchor="middle">20 V @ 5 A</text>
    <text x="130" y="395" font-size="11" text-anchor="middle" fill="#7a5b00">(slim, fancy)</text>
  </g>

  <!-- 5V Buck -->
  <g>
    <rect x="280" y="230" width="220" height="100" rx="8" fill="#d6e9ff" stroke="#1e4f8a" stroke-width="2"/>
    <text x="390" y="260" font-size="15" font-weight="bold" text-anchor="middle">5 V Buck Converter</text>
    <text x="390" y="282" font-size="13" text-anchor="middle">TPS62130 (20 V → 5 V / 1 A)</text>
  </g>

  <!-- 3.3V LDO -->
  <g>
    <rect x="280" y="370" width="220" height="80" rx="8" fill="#d6e9ff" stroke="#1e4f8a" stroke-width="2"/>
    <text x="390" y="400" font-size="15" font-weight="bold" text-anchor="middle">3.3 V LDO</text>
    <text x="390" y="422" font-size="13" text-anchor="middle">AP2112K-3.3 (5 V → 3.3 V)</text>
  </g>

  <!-- MCU ATMega328PB (center) -->
  <g>
    <rect x="560" y="280" width="220" height="160" rx="8" fill="#fff3cd" stroke="#856404" stroke-width="2"/>
    <text x="670" y="310" font-size="16" font-weight="bold" text-anchor="middle">MCU</text>
    <text x="670" y="332" font-size="14" text-anchor="middle">ATMega328PB</text>
    <text x="670" y="358" font-size="11" text-anchor="middle">Web Shooter logic</text>
    <text x="670" y="378" font-size="11" text-anchor="middle">5 V / 200 mA</text>
    <text x="670" y="402" font-size="11" text-anchor="middle">I²S, I²C, GPIO, ADC</text>
  </g>

  <!-- Speaker -->
  <g>
    <rect x="850" y="100" width="200" height="100" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
    <text x="950" y="130" font-size="15" font-weight="bold" text-anchor="middle">Speaker + MAX98357A</text>
    <text x="950" y="152" font-size="12" text-anchor="middle">I²S Class-D amp</text>
    <text x="950" y="172" font-size="11" text-anchor="middle">8 Ω / 1 W (entry soundtrack)</text>
  </g>

  <!-- Heart Rate -->
  <g>
    <rect x="850" y="240" width="200" height="100" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
    <text x="950" y="270" font-size="15" font-weight="bold" text-anchor="middle">MAX30102</text>
    <text x="950" y="292" font-size="12" text-anchor="middle">Heart-rate / SpO₂ sensor</text>
    <text x="950" y="312" font-size="11" text-anchor="middle">I²C @ 0x57</text>
  </g>

  <!-- High Power LED -->
  <g>
    <rect x="850" y="380" width="200" height="100" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
    <text x="950" y="410" font-size="15" font-weight="bold" text-anchor="middle">High-Power LED</text>
    <text x="950" y="432" font-size="12" text-anchor="middle">Cree XLamp XQ-A (1 W)</text>
    <text x="950" y="452" font-size="11" text-anchor="middle">P-MOSFET driven by GPIO</text>
  </g>

  <!-- Voice Recorder -->
  <g>
    <rect x="850" y="520" width="200" height="100" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
    <text x="950" y="550" font-size="15" font-weight="bold" text-anchor="middle">ISD1820</text>
    <text x="950" y="572" font-size="12" text-anchor="middle">Voice record / playback</text>
    <text x="950" y="592" font-size="11" text-anchor="middle">Analog mic + GPIO control</text>
  </g>

  <!-- Power lines (red, solid) -->
  <line x1="220" y1="375" x2="280" y2="280" stroke="#c0392b" stroke-width="3"/>
  <text x="245" y="320" font-size="11" fill="#c0392b">20 V</text>

  <line x1="500" y1="280" x2="560" y2="320" stroke="#c0392b" stroke-width="3"/>
  <text x="510" y="305" font-size="11" fill="#c0392b">5 V</text>

  <line x1="500" y1="410" x2="560" y2="380" stroke="#c0392b" stroke-width="3"/>
  <text x="510" y="400" font-size="11" fill="#c0392b">3.3 V</text>

  <line x1="780" y1="340" x2="850" y2="150" stroke="#c0392b" stroke-width="3"/>
  <text x="810" y="245" font-size="11" fill="#c0392b">5 V</text>

  <line x1="780" y1="360" x2="850" y2="290" stroke="#c0392b" stroke-width="3"/>
  <text x="810" y="335" font-size="11" fill="#c0392b">3.3 V</text>

  <line x1="780" y1="380" x2="850" y2="430" stroke="#c0392b" stroke-width="3"/>
  <text x="810" y="420" font-size="11" fill="#c0392b">5 V</text>

  <line x1="780" y1="400" x2="850" y2="570" stroke="#c0392b" stroke-width="3"/>
  <text x="810" y="500" font-size="11" fill="#c0392b">5 V</text>

  <!-- Data lines (blue, dashed) -->
  <line x1="780" y1="350" x2="850" y2="160" stroke="#1565c0" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="810" y="260" font-size="11" fill="#1565c0">I²S</text>

  <line x1="780" y1="370" x2="850" y2="300" stroke="#1565c0" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="810" y="345" font-size="11" fill="#1565c0">I²C</text>

  <line x1="780" y1="390" x2="850" y2="445" stroke="#1565c0" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="810" y="430" font-size="11" fill="#1565c0">GPIO/PWM</text>

  <line x1="780" y1="410" x2="850" y2="585" stroke="#1565c0" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="810" y="510" font-size="11" fill="#1565c0">GPIO/Analog</text>

  <!-- Legend -->
  <g>
    <rect x="40" y="640" width="700" height="60" rx="8" fill="#fafafa" stroke="#aaa"/>
    <text x="55" y="662" font-size="13" font-weight="bold">Legend</text>
    <line x1="55" y1="685" x2="105" y2="685" stroke="#c0392b" stroke-width="3"/>
    <text x="115" y="690" font-size="12">Power</text>
    <line x1="220" y1="685" x2="270" y2="685" stroke="#1565c0" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="280" y="690" font-size="12">Data (I²S / I²C / GPIO)</text>
  </g>
</svg>